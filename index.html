<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Brechó - Controle e Vitrine</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Mensagens visuais */
    .mensagem {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
    }
    .erro {
      background-color: #fcebea;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .sucesso {
      background-color: #eaf7ea;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    /* Banner */
    #banner {
      background-color: #e6d2b5;
      color: #a67c52;
      text-align: center;
      padding: 15px;
      margin: 20px auto;
      border-radius: 8px;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
      max-width: 600px;
    }
    #banner h2 {
      margin: 0;
      font-size: 20px;
      font-weight: bold;
    }
    #painelBanner {
      margin-top: 10px;
      padding: 8px;
      background-color: #fffaf3;
      border: 1px solid #ccc;
      border-radius: 6px;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Brechó da Feira</h1>

  <!-- Login -->
  <div id="loginArea">
    <h2>Login Administrativo</h2>
    <form id="loginForm">
      <input type="email" id="usuario" placeholder="Email" required>
      <input type="password" id="senha" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
    <div id="loginMsg"></div>
  </div>

  <!-- Painel Administrativo -->
  <div id="painel" style="display:none;">
    <h2>Painel Administrativo</h2>
    <button id="logoutBtn">Sair</button>

    <!-- Cadastro de novos usuários -->
    <h3>Cadastrar Novo Usuário</h3>
    <form id="registerForm">
      <input type="email" id="novoEmail" placeholder="Novo Email" required>
      <input type="password" id="novaSenha" placeholder="Nova Senha" required>
      <button type="submit">Cadastrar Usuário</button>
    </form>
    <div id="registerMsg"></div>

    <!-- Cadastro de produtos -->
    <h3>Cadastrar Produto</h3>
    <form id="productForm">
      <input type="text" id="nome" placeholder="Nome do Produto" required>
      <input type="number" id="quantidade" placeholder="Quantidade" required>
      <select id="estado">
        <option value="Novo">Novo</option>
        <option value="SemiNovo">SemiNovo</option>
      </select>
      <input type="number" id="preco" placeholder="Preço (R$)" required>
      <select id="qualidade">
        <option value="Normal">Normal</option>
        <option value="Avariado">Avariado</option>
        <option value="Quebrado">Quebrado</option>
      </select>
      <input type="file" id="foto" accept="image/*">
      <textarea id="descricao" placeholder="Descrição"></textarea>
      <button type="submit">Cadastrar Produto</button>
    </form>
    <div id="productMsg"></div>

    <!-- Relatório Administrativo -->
    <h3>Relatório Administrativo</h3>
    <table id="productTable">
      <thead>
        <tr>
          <th>Nome</th><th>Qtd</th><th>Estado</th><th>Preço</th><th>Qualidade</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- Configuração do Banner -->
    <h3>Configuração do Banner</h3>
    <form id="bannerForm">
      <label>Escolha uma frase pré-montada:</label>
      <select id="frasePre"></select>
      <label>Ou escreva sua própria frase:</label>
      <input type="text" id="fraseCustom" placeholder="Frase personalizada">
      <button type="submit">Atualizar Banner</button>
    </form>
    <div id="bannerMsg"></div>
    <p id="painelBanner"></p>
  </div>

  <!-- Banner de destaque -->
  <div id="banner">
    <h2>Confira nossas novidades!</h2>
  </div>

  <!-- Vitrine Pública -->
  <h2>Vitrine de Produtos</h2>
  <div id="vitrine"></div>

  <!-- Firebase SDK modular -->
  <script type="module" src="script.js"></script>
</body>
</html>
